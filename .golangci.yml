run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - misspell
    - goimports

linters-settings:
  goimports:
    local-prefixes: github.com/harness/harness-cli

issues:
  exclude-rules:
    # test files don't need exhaustive error checking
    - path: _test\.go
      linters: [errcheck]
