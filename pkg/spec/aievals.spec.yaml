spec_version: 1
module_type: builtin
module_desc: Harness AI Evals — datasets, evaluations, runs, metrics, metric sets, suites, targets, and models
harness_internal: true
help_text: |
  ## AI Evals (aievals)

  The AI Evals module lets you define, run, and score evaluations of LLM
  pipelines and prompts. It is built around a dataset → evaluation → run
  lifecycle with configurable metrics and targets.

  ### Domain Model

  An eval_dataset holds input/output pairs (rows) used as test cases.

  An evaluation wires together a dataset, an eval_target (the LLM endpoint
  under test), and an eval_metric_set (the scoring criteria). Trigger a run
  with `execute evaluation:run <eval_id>`.

  An eval_run is one execution of an evaluation. It scores every dataset item
  against the metric set and produces an aggregate pass rate.

  An eval_metric is a single scoring function (e.g. exact_match, rubric_judge,
  contains, geval). Metrics are grouped into eval_metric_sets with optional
  pass/fail thresholds.

  An eval_target points at the LLM endpoint being tested (e.g. a Harness AI
  Gateway route). An eval_model defines a provider + model ID used as a judge
  or target (e.g. openai / gpt-4o).

  An eval_suite groups multiple evaluations that should run together. Trigger
  the whole suite with `execute eval_suite:run <suite_id>`.

  ### Typical workflow

    harness create eval_dataset --set name=smoke identifier=smoke
    harness create eval_target  --set name=my-llm identifier=my-llm type=prompt
    harness create eval_metric_set --set name=basic identifier=basic
    harness create evaluation   --set name=v1 identifier=v1 dataset_id=<id> target_id=<id>
    harness execute evaluation:run <eval_id>
    harness list eval_run <eval_id>

  ### Nouns

  {{nouns}}

nouns:
  - noun: eval_dataset
    short_desc: An AI Evals dataset containing input/output pairs for evaluation.
    noun_aliases: [eval_datasets]
    fields:
      - id: id
        label: ID
        expr: it.id
      - id: identifier
        expr: it.identifier
      - id: name
        expr: it.name
      - id: description
        expr: it.description
      - id: item_count
        label: Items
        expr: it.item_count
        align: right
      - id: created
        expr: epochMs(it.created_at)
      - id: updated
        expr: epochMs(it.updated_at)

  - noun: evaluation
    short_desc: An AI Eval wiring a dataset, target, and metric set. Trigger runs via execute action run.
    noun_aliases: [evaluations, eval]
    fields:
      - id: id
        label: ID
        expr: it.id
      - id: identifier
        expr: it.identifier
      - id: name
        expr: it.name
      - id: description
        expr: it.description
      - id: dataset_id
        label: Dataset
        expr: it.dataset_id
      - id: target_id
        label: Target
        expr: it.target_id
      - id: status
        expr: it.status
      - id: created
        expr: epochMs(it.created_at)
      - id: updated
        expr: epochMs(it.updated_at)

  - noun: eval_run
    short_desc: A single execution of an AI Eval with per-item scores and an aggregate pass rate.
    noun_aliases: [eval_runs]
    fields:
      - id: id
        label: ID
        expr: it.id
      - id: eval_id
        label: Eval
        expr: it.eval_id
      - id: status
        expr: it.status
      - id: pass_rate
        label: Pass %
        expr: it.summary.pass_rate
        align: right
      - id: total_items
        label: Items
        expr: it.summary.total_items
        align: right
      - id: started
        expr: epochMs(it.started_at)
      - id: finished
        expr: epochMs(it.finished_at)

  - noun: eval_metric
    short_desc: An AI Evals metric (e.g. exact_match, rubric_judge, contains, geval).
    noun_aliases: [eval_metrics]
    fields:
      - id: id
        label: ID
        expr: it.id
      - id: identifier
        expr: it.identifier
      - id: name
        expr: it.name
      - id: kind
        expr: it.kind
      - id: description
        expr: it.description

  - noun: eval_metric_set
    short_desc: A named collection of AI Evals metrics with optional thresholds.
    noun_aliases: [eval_metric_sets]
    fields:
      - id: id
        label: ID
        expr: it.id
      - id: identifier
        expr: it.identifier
      - id: name
        expr: it.name
      - id: description
        expr: it.description
      - id: metric_count
        label: Metrics
        expr: it.metric_count
        align: right

  - noun: eval_target
    short_desc: An AI Evals target — the LLM endpoint under test.
    noun_aliases: [eval_targets]
    fields:
      - id: id
        label: ID
        expr: it.id
      - id: identifier
        expr: it.identifier
      - id: name
        expr: it.name
      - id: type
        expr: it.type
      - id: description
        expr: it.description

  - noun: eval_model
    short_desc: An AI Evals model definition (provider + model ID for use as judge or target).
    noun_aliases: [eval_models]
    fields:
      - id: id
        label: ID
        expr: it.id
      - id: identifier
        expr: it.identifier
      - id: name
        expr: it.name
      - id: provider
        expr: it.provider
      - id: model_id
        label: Model
        expr: it.model_id

  - noun: eval_suite
    short_desc: A named collection of evaluations run together.
    noun_aliases: [eval_suites]
    fields:
      - id: id
        label: ID
        expr: it.id
      - id: identifier
        expr: it.identifier
      - id: name
        expr: it.name
      - id: description
        expr: it.description

commands:
  # ── eval_dataset ──────────────────────────────────────────────────────────────

  - command: list eval_dataset
    verb: list
    noun: eval_dataset
    short: List AI Evals datasets
    handler_type: endpoint
    endpoint:
      path: /gateway/ai-evals/api/v1/orgs/{{auth.org}}/projects/{{auth.project}}/dataset
      request_headers:
        Harness-Account: auth.account
      items_expr: it
      get_id_expr: it.identifier
      query_params:
        page: flags.page
        size: flags.limit
      paging:
        paging_strategy: page_header
        countable: false
        page_index_param: page
        page_size_param: size
        page_size_default: 20
        page_size_max: 100
      columns: [identifier, name, item_count, created]

  - command: get eval_dataset
    verb: get
    noun: eval_dataset
    short: "Get an AI Evals dataset by ID"
    handler_type: endpoint
    endpoint:
      path: /gateway/ai-evals/api/v1/orgs/{{auth.org}}/projects/{{auth.project}}/dataset/{{ctx.id}}
      request_headers:
        Harness-Account: auth.account
      item_expr: it

  - command: create eval_dataset
    verb: create
    noun: eval_dataset
    short: "Create an AI Evals dataset: harness create eval_dataset --set name=... identifier=..."
    handler_type: endpoint
    flags_builtin:
      set: true
    endpoint:
      method: POST
      path: /gateway/ai-evals/api/v1/orgs/{{auth.org}}/projects/{{auth.project}}/dataset
      request_headers:
        Harness-Account: auth.account
      create_strategy: set-fields
      create_body_wrap: ""
      text_header: "\nCreated dataset {{it.identifier}}\n"

  - command: delete eval_dataset
    verb: delete
    noun: eval_dataset
    confirm_mode: prompt
    short: Delete an AI Evals dataset by ID
    handler_type: endpoint
    endpoint:
      method: DELETE
      path: /gateway/ai-evals/api/v1/orgs/{{auth.org}}/projects/{{auth.project}}/dataset/{{ctx.id}}
      request_headers:
        Harness-Account: auth.account
