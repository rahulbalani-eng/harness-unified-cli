spec_version: 1
module_type: builtin
module_desc: Harness Code repositories, pull requests, branches, commits, and tags
help_text: |
  ## Code (code)

  Harness Code is a built-in git hosting service. It provides repositories, pull
  requests, branches, commits, and tags without requiring an external git provider.

  ### Domain Model

  A repository is the top-level resource. Branches, tags, and commits live inside a
  repository. A pull request targets a repository branch and has an activity timeline
  (comments, reviews, state changes) and threaded comments associated with it.

  ### Nouns

  {{nouns}}

nouns:
  - noun: repository
    short_desc: A Harness Code source repository.
    noun_aliases: [repo, repos, repositories]
    url_path: /ng/account/{{auth.account}}/module/code/orgs/{{auth.org}}/projects/{{auth.project}}/repos/{{it.identifier}}
    fields:
      - id: identifier
        expr: it.identifier
      - id: description
        expr: it.description
        field_type: multiline_text
      - id: default_branch
        expr: it.default_branch
      - id: is_public
        expr: it.is_public
      - id: num_forks
        label: Forks
        expr: it.num_forks
        align: right
      - id: num_pulls
        label: PRs
        expr: it.num_pulls
        align: right
      - id: num_open_pulls
        label: Open PRs
        expr: it.num_open_pulls
        align: right
      - id: num_closed_pulls
        label: Closed PRs
        expr: it.num_closed_pulls
        align: right
      - id: num_merged_pulls
        label: Merged PRs
        expr: it.num_merged_pulls
        align: right
      - id: language
        expr: it.language
      - id: size
        expr: it.size
        align: right
      - id: git_url
        label: Git URL
        expr: it.git_url
      - id: url
        label: URL
        expr: url(it)
      - id: updated
        expr: epochMs(it.updated)
      - id: created
        expr: epochMs(it.created)

  - noun: pr
    short_desc: A Harness Code pull request.
    noun_aliases: [prs, pull_request, pull_requests]
    url_path: /ng/account/{{auth.account}}/all/code/orgs/{{auth.org}}/projects/{{auth.project}}/repos/{{ctx.idParts[0]}}/pulls/{{it.number}}/conversation
    fields:
      - id: number
        label: "#"
        expr: it.number
        align: right
      - id: title
        expr: it.title
      - id: description
        expr: it.description
        field_type: multiline_text
      - id: state
        expr: it.state
      - id: is_draft
        label: Draft
        expr: it.is_draft
      - id: source_branch
        label: Source Branch
        expr: it.source_branch
      - id: target_branch
        label: Target Branch
        expr: it.target_branch
      - id: author
        expr: it.author.display_name
      - id: author_email
        label: Author Email
        expr: it.author.email
      - id: author_uid
        label: Author UID
        expr: it.author.uid
      - id: merger
        expr: it.merger.display_name
      - id: merger_email
        label: Merger Email
        expr: it.merger.email
      - id: merger_uid
        label: Merger UID
        expr: it.merger.uid
      - id: reviewers
        expr: it.stats.reviews.required_count
        label: Reqd Reviews
        align: right
      - id: approvals
        expr: it.stats.reviews.latest_approvals
        align: right
      - id: merge_strategy
        expr: it.merge_method
      - id: merge_check_status
        label: Merge Check
        expr: it.merge_check_status
      - id: rebase_check_status
        label: Rebase Check
        expr: it.rebase_check_status
      - id: commits
        expr: it.stats.commits
        align: right
      - id: conversations
        expr: it.stats.conversations
        align: right
      - id: unresolved_count
        label: Unresolved
        expr: it.stats.unresolved_count
        align: right
      - id: files_changed
        label: Files Changed
        expr: it.stats.files_changed
        align: right
      - id: additions
        expr: it.stats.additions
        align: right
      - id: deletions
        expr: it.stats.deletions
        align: right
      - id: source_sha
        label: Source SHA
        expr: it.source_sha
      - id: merge_base_sha
        label: Merge Base SHA
        expr: it.merge_base_sha
      - id: created
        expr: epochMs(it.created)
      - id: edited
        expr: epochMs(it.edited)
      - id: updated
        expr: epochMs(it.updated)
      - id: merged
        expr: epochMs(it.merged)

  - noun: branch
    short_desc: A git branch in a Harness Code repository.
    noun_aliases: [branches]
    fields:
      - id: name
        expr: it.name
      - id: sha
        expr: it.sha
      - id: sha8
        expr: substr(it.sha, 0, 8)
      - id: is_default
        label: Default
        expr: it.is_default
      - id: commit_message
        label: Last Commit
        expr: it.commit.message
      - id: author
        expr: it.commit.author.identity.name
      - id: updated
        expr: epochMs(it.commit.author.when)

  - noun: commit
    short_desc: A git commit in a Harness Code repository.
    noun_aliases: [commits]
    fields:
      - id: sha
        expr: it.sha
      - id: message
        expr: it.message
        width_max: 60
      - id: title
        expr: it.title
        width_max: 60
      - id: author
        expr: it.author.identity.name
      - id: author_email
        expr: it.author.identity.email
      - id: authored
        expr: epochMs(it.author.when)
      - id: committer
        expr: it.committer.identity.name
      - id: committer_email
        expr: it.committer.identity.email
      - id: committed
        expr: epochMs(it.committer.when)

  - noun: tag
    short_desc: A git tag in a Harness Code repository.
    noun_aliases: [tags]
    fields:
      - id: name
        expr: it.name
      - id: sha
        expr: it.sha
      - id: message
        expr: it.message

  - noun: pr_comment
    short_desc: A comment on a pull request.
    noun_aliases: [pr_comments]
    fields:
      - id: id
        label: ID
        expr: int(it.id)
      - id: order
        expr: formatOrder(it.order, it.sub_order)
        align: right
      - id: author
        expr: it.author.display_name
      - id: text
        expr: it.text
      - id: status
        expr: it.status
      - id: parent_id
        expr: int(it.parent_id)
      - id: created
        expr: epochMs(it.created)
      - id: updated
        expr: epochMs(it.updated)

  - noun: commit_check
    short_desc: A status check result on a specific commit (full history, not just the current PR head).
    noun_aliases: [commit_checks]
    fields:
      - id: identifier
        expr: it.identifier
      - id: status
        expr: it.status
      - id: summary
        expr: it.summary
        width_max: 60
      - id: link
        expr: it.link
      - id: reported_by
        label: Reported By
        expr: it.reported_by.display_name
      - id: reported_by_email
        label: Reported By Email
        expr: it.reported_by.email
      - id: reported_by_uid
        label: Reported By UID
        expr: it.reported_by.uid
      - id: started
        expr: epochMs(it.started)
      - id: ended
        expr: epochMs(it.ended)
      - id: duration
        expr: duration(it.started, it.ended)
        align: right
      - id: created
        expr: epochMs(it.created)
      - id: updated
        expr: epochMs(it.updated)
      - id: payload_kind
        label: Payload Kind
        expr: it.payload.kind

  - noun: pr_check
    short_desc: A status check on a pull request (CI, required checks, etc).
    noun_aliases: [pr_checks]
    fields:
      - id: identifier
        expr: it.check.identifier
      - id: status
        expr: it.check.status
      - id: required
        expr: it.required
      - id: summary
        expr: it.check.summary
        width_max: 60
      - id: link
        expr: it.check.link
      - id: reported_by
        label: Reported By
        expr: it.check.reported_by.display_name
      - id: reported_by_email
        label: Reported By Email
        expr: it.check.reported_by.email
      - id: reported_by_uid
        label: Reported By UID
        expr: it.check.reported_by.uid
      - id: started
        expr: epochMs(it.check.started)
      - id: ended
        expr: epochMs(it.check.ended)
      - id: duration
        expr: duration(it.check.started, it.check.ended)
        align: right
      - id: created
        expr: epochMs(it.check.created)
      - id: updated
        expr: epochMs(it.check.updated)
      - id: bypassable
        expr: it.bypassable
      - id: payload_kind
        label: Payload Kind
        expr: it.check.payload.kind
      - id: pipeline_id
        label: Pipeline
        expr: it.check.payload.data.pipeline_identifier
      - id: pipeline_org
        label: Pipeline Org
        expr: it.check.payload.data.org_identifier
      - id: pipeline_project
        label: Pipeline Project
        expr: it.check.payload.data.project_identifier
      - id: execution_id
        label: Execution ID
        expr: it.check.payload.data.execution_id
      - id: stage_id
        label: Stage ID
        expr: it.check.payload.data.stage_identifier

  - noun: pr_activity
    short_desc: Activity timeline entry on a pull request (comments, reviews, state changes).
    noun_aliases: [pr_activities]
    fields:
      - id: id
        label: ID
        expr: int(it.id)
      - id: kind
        expr: it.kind
      - id: type
        expr: it.type
      - id: author
        expr: it.author.display_name
      - id: author_email
        expr: it.author.email
      - id: text
        expr: it.text
        width_max: 80
      - id: order
        expr: it.order
        align: right
      - id: created
        expr: epochMs(it.created)
      - id: edited
        expr: epochMs(it.edited)

commands:
  # ── repository ──────────────────────────────────────────────────────────────

  - command: list repository
    verb: list
    noun: repository
    short: List code repositories
    handler_type: endpoint
    flags:
      - name: search
        description: Filter by name or keyword
    endpoint:
      path: /code/api/v1/repos
      items_expr: it
      get_id_expr: it.identifier
      query_params:
        query: flags.search
        page: flags.page
        limit: flags.limit
      paging:
        paging_strategy: page_header
        countable: false
        page_index_param: page
        page_size_param: limit
        page_size_default: 30
        page_size_max: 100
        page_base: 1
      completion:
        id_expr: it.identifier
        name_expr: it.identifier
      columns: [identifier, default_branch, num_open_pulls, updated]

  - command: get repository
    verb: get
    noun: repository
    short: Get repository details
    handler_type: endpoint
    endpoint:
      path: /code/api/v1/repos/{{ctx.id}}
      item_expr: it
      yaml_pick_expr: it

  - command: create repository
    verb: create
    noun: repository
    short: "Create a new repository: --set identifier=<name> [default_branch=main] [description=...] [is_public=true]"
    handler_type: endpoint
    endpoint:
      method: POST
      path: /code/api/v1/repos
      create_strategy: set-fields
      create_body_init:
        identifier: ctx.id
        default_branch: '"main"'
      create_body_wrap: ""
      text_header: "\nCreated repository {{it.identifier}}\n"
      text_footer: "{{url(it)}}\n"

  - command: update repository
    verb: update
    noun: repository
    short: Update a repository (description, default_branch, is_public)
    handler_type: endpoint
    flags_builtin:
      set: true
      del: true
    endpoint:
      method: PATCH
      path: /code/api/v1/repos/{{ctx.id}}
      update_strategy: get-then-put
      update_body_pick: it
      no_fields: true
      text_header: "\nUpdated repository {{ctx.id}}\n"

  - command: delete repository
    verb: delete
    noun: repository
    confirm_mode: confirm_id
    short: Delete a repository
    handler_type: endpoint
    endpoint:
      method: DELETE
      path: /code/api/v1/repos/{{ctx.id}}
      item_expr: it

  # ── pr ──────────────────────────────────────────────────────────────────────

  - command: list pr
    verb: list
    noun: pr
    short: "List pull requests for a repository: harness list pr <repo_id> [--state open|closed|merged|all] [--author <id>] [--created-after <date>]"
    handler_type: endpoint
    requires_parentid: true
    parentid_label: "<repo_id>"
    completion_noun: repository
    flags:
      - name: state
        description: "Filter by state: open, closed, merged, all"
        default: all
        completion_values: [open, closed, merged, all]
      - name: search
        description: Filter by keyword
      - name: author
        description: "Filter by author (principal ID number from user list)"
      - name: created-after
        description: "Show PRs created after this date (YYYY-MM-DD, relative like 30d/2w/1m (m=month), or epoch ms)"
      - name: created-before
        description: "Show PRs created before this date (YYYY-MM-DD, relative like 30d/2w/1m (m=month), or epoch ms)"
      - name: sort
        description: "Sort field: number, created, updated, edited, merged"
        default: number
        completion_values: [number, created, updated, edited, merged]
      - name: order
        description: "Sort direction: asc, desc"
        default: desc
        completion_values: [asc, desc]
    endpoint:
      path: /code/api/v1/repos/{{ctx.parentId}}/pullreq
      items_expr: it
      get_id_expr: string(it.number)
      query_params:
        state: 'flags.state == "all" ? "" : flags.state'
        query: flags.search
        created_by: flags.author
        created_gt: 'parseDateMs(flags["created-after"])'
        created_lt: 'parseDateMs(flags["created-before"])'
        sort: 'flags.sort == "number" ? "" : flags.sort'
        order: 'flags.order == "desc" ? "" : flags.order'
        page: flags.page
        limit: flags.limit
      paging:
        paging_strategy: page_header
        countable: false
        page_index_param: page
        page_size_param: limit
        page_size_default: 30
        page_size_max: 100
        page_base: 1
      completion:
        id_expr: string(it.number)
        name_expr: '"#" + string(it.number) + " " + it.title'
        no_search_inject: true
      columns: [number, title, state, source_branch, target_branch, author, updated]

  - command: get pr
    verb: get
    noun: pr
    short: "Get pull request details: harness get pr <repo_id>/<pr_number>"
    handler_type: endpoint
    id_parts: 2
    completion_seq:
      - completion_noun: repository
      - completion_noun: pr
        keep_order: true
    endpoint:
      path: /code/api/v1/repos/{{ctx.idParts[0]}}/pullreq/{{ctx.idParts[1]}}
      item_expr: it
      yaml_pick_expr: it
      text_footer: "\n{{url(it)}}\n"

  - command: create pr
    verb: create
    noun: pr
    short: "Create a pull request: harness create pr <repo_id> --set title=... source_branch=... target_branch=..."
    handler_type: endpoint
    requires_parentid: true
    parentid_label: "<repo_id>"
    flags_builtin:
      set: true
    endpoint:
      method: POST
      path: /code/api/v1/repos/{{ctx.parentId}}/pullreq
      create_strategy: set-fields
      create_body_init:
        target_branch: '"main"'
      create_body_wrap: ""
      text_header: "\nCreated PR #{{it.number}}: {{it.title}}\n"
      text_footer: "{{url(it)}}\n"

  - command: update pr
    verb: update
    noun: pr
    short: "Update a pull request: harness update pr <repo_id>/<pr_number> --set title=..."
    handler_type: endpoint
    id_parts: 2
    flags_builtin:
      set: true
      del: true
    endpoint:
      method: PATCH
      path: /code/api/v1/repos/{{ctx.idParts[0]}}/pullreq/{{ctx.idParts[1]}}
      update_strategy: get-then-put
      update_body_pick: it
      no_fields: true
      text_header: "\nUpdated PR #{{ctx.idParts[1]}}\n"

  - command: execute pr:merge
    verb: execute
    noun: pr
    noun_variant: merge
    short: "Merge a pull request: harness execute pr:merge <repo_id>/<pr_number> [--method merge|squash|rebase|fast-forward]"
    handler_type: endpoint
    id_parts: 2
    completion_seq:
      - completion_noun: repository
      - completion_noun: pr
        keep_order: true
    flags:
      - name: method
        description: "Merge method: merge, squash, rebase, fast-forward"
        default: merge
        completion_values: [merge, squash, rebase, fast-forward]
      - name: delete-branch
        description: Delete source branch after merge
        is_bool: true
      - name: dry-run
        description: Simulate merge without executing
        is_bool: true
    endpoint:
      method: POST
      path: /code/api/v1/repos/{{ctx.idParts[0]}}/pullreq/{{ctx.idParts[1]}}/merge
      body_fn: merge_pr_body
      no_fields: true
      text_header: "\nMerged PR #{{ctx.idParts[1]}}\n"

  - command: execute pr:close
    verb: execute
    noun: pr
    noun_variant: close
    short: "Close a pull request: harness execute pr:close <repo_id>/<pr_number>"
    handler_type: endpoint
    id_parts: 2
    completion_seq:
      - completion_noun: repository
      - completion_noun: pr
        keep_order: true
    endpoint:
      method: POST
      path: /code/api/v1/repos/{{ctx.idParts[0]}}/pullreq/{{ctx.idParts[1]}}/state
      body_params:
        state: '"closed"'
      no_fields: true
      text_header: "\nClosed PR #{{ctx.idParts[1]}}\n"

  # ── branch ──────────────────────────────────────────────────────────────────

  - command: list branch
    verb: list
    noun: branch
    short: "List branches: harness list branch <repo_id>"
    handler_type: endpoint
    requires_parentid: true
    parentid_label: "<repo_id>"
    flags:
      - name: search
        description: Filter by branch name
    endpoint:
      path: /code/api/v1/repos/{{ctx.parentId}}/branches
      items_expr: it
      get_id_expr: it.name
      query_params:
        query: flags.search
        page: flags.page
        limit: flags.limit
      paging:
        paging_strategy: page_header
        countable: false
        page_index_param: page
        page_size_param: limit
        page_size_default: 30
        page_size_max: 100
        page_base: 1
      columns: [name, sha8, is_default, author, updated]

  - command: get branch
    verb: get
    noun: branch
    short: "Get branch details: harness get branch <repo_id>/<branch_name>"
    handler_type: endpoint
    id_parts: 2
    completion_seq:
      - completion_noun: repository
      - completion_noun: branch
        keep_order: true
    endpoint:
      path: /code/api/v1/repos/{{ctx.idParts[0]}}/branches/{{ctx.idParts[1]}}
      item_expr: it

  - command: create branch
    verb: create
    noun: branch
    short: "Create a branch: harness create branch <repo_id> --set name=<branch> target=<sha_or_branch>"
    handler_type: endpoint
    requires_parentid: true
    parentid_label: "<repo_id>"
    flags_builtin:
      set: true
    endpoint:
      method: POST
      path: /code/api/v1/repos/{{ctx.parentId}}/branches
      create_strategy: set-fields
      create_body_wrap: ""
      text_header: "\nCreated branch {{it.name}}\n"

  - command: delete branch
    verb: delete
    noun: branch
    confirm_mode: prompt
    short: "Delete a branch: harness delete branch <repo_id>/<branch_name>"
    handler_type: endpoint
    id_parts: 2
    endpoint:
      method: DELETE
      path: /code/api/v1/repos/{{ctx.idParts[0]}}/branches/{{ctx.idParts[1]}}
      item_expr: it

  # ── commit ───────────────────────────────────────────────────────────────────

  - command: list commit
    verb: list
    noun: commit
    short: "List commits: harness list commit <repo_id> [--branch <ref>]"
    handler_type: endpoint
    requires_parentid: true
    parentid_label: "<repo_id>"
    completion_noun: repository
    flags:
      - name: branch
        description: Git ref (branch/tag/SHA) to list commits from
      - name: path
        description: Filter commits by file path
    endpoint:
      path: /code/api/v1/repos/{{ctx.parentId}}/commits
      items_expr: it.commits
      get_id_expr: it.sha
      query_params:
        git_ref: flags.branch
        path: flags.path
        page: flags.page
        limit: flags.limit
      paging:
        paging_strategy: page_header
        countable: false
        page_index_param: page
        page_size_param: limit
        page_size_default: 20
        page_size_max: 100
        page_base: 1
      columns: [sha, title, author, authored]

  - command: get commit
    verb: get
    noun: commit
    short: "Get commit details: harness get commit <repo_id>/<sha>"
    handler_type: endpoint
    id_parts: 2
    completion_seq:
      - completion_noun: repository
      - completion_noun: commit
        keep_order: true
    endpoint:
      path: /code/api/v1/repos/{{ctx.idParts[0]}}/commits/{{ctx.idParts[1]}}
      item_expr: it

  # ── tag ──────────────────────────────────────────────────────────────────────

  - command: list tag
    verb: list
    noun: tag
    short: "List tags: harness list tag <repo_id>"
    handler_type: endpoint
    requires_parentid: true
    parentid_label: "<repo_id>"
    flags:
      - name: search
        description: Filter by tag name
    endpoint:
      path: /code/api/v1/repos/{{ctx.parentId}}/tags
      items_expr: it
      get_id_expr: it.name
      query_params:
        query: flags.search
        page: flags.page
        limit: flags.limit
      paging:
        paging_strategy: page_header
        countable: false
        page_index_param: page
        page_size_param: limit
        page_size_default: 30
        page_size_max: 100
        page_base: 1
      columns: [name, sha, message]

  - command: create tag
    verb: create
    noun: tag
    short: "Create a tag: harness create tag <repo_id> --set name=<tag> target=<sha>"
    handler_type: endpoint
    requires_parentid: true
    parentid_label: "<repo_id>"
    flags_builtin:
      set: true
    endpoint:
      method: POST
      path: /code/api/v1/repos/{{ctx.parentId}}/tags
      create_strategy: set-fields
      create_body_wrap: ""
      text_header: "\nCreated tag {{it.name}}\n"

  - command: delete tag
    verb: delete
    noun: tag
    confirm_mode: prompt
    short: "Delete a tag: harness delete tag <repo_id>/<tag_name>"
    handler_type: endpoint
    id_parts: 2
    endpoint:
      method: DELETE
      path: /code/api/v1/repos/{{ctx.idParts[0]}}/tags/{{ctx.idParts[1]}}
      item_expr: it

  # ── pr_activity ───────────────────────────────────────────────────────────────

  - command: list pr_activity
    verb: list
    noun: pr_activity
    short: "List PR activity (comments, reviews, state changes): harness list pr_activity <repo_id>/<pr_number>"
    handler_type: endpoint
    requires_parentid: true
    parentid_label: "<repo_id>/<pr_number>"
    id_parts: 2
    completion_seq:
      - completion_noun: repository
      - completion_noun: pr
        keep_order: true
    flags:
      - name: kind
        description: "Filter by kind: comment, system, change-comment"
        completion_values: [comment, system, change-comment]
      - name: type
        description: "Filter by type: comment, code-comment, review-submit, state-change, ..."
    endpoint:
      path: /code/api/v1/repos/{{ctx.parentIdParts[0]}}/pullreq/{{ctx.parentIdParts[1]}}/activities
      items_expr: it
      get_id_expr: "-"
      query_params:
        kind: flags.kind
        type: flags.type
        limit: flags.limit
      paging:
        paging_strategy: flat_list
      columns: [id, kind, type, author, text, created]

  # ── pr_commit ────────────────────────────────────────────────────────────────

  - command: list pr_commit
    verb: list
    noun: pr_commit
    fields_noun: commit
    short: "List commits in a pull request: harness list pr_commit <repo_id>/<pr_number>"
    handler_type: endpoint
    requires_parentid: true
    parentid_label: "<repo_id>/<pr_number>"
    id_parts: 2
    completion_seq:
      - completion_noun: repository
      - completion_noun: pr
        keep_order: true
    endpoint:
      path: /code/api/v1/repos/{{ctx.parentIdParts[0]}}/pullreq/{{ctx.parentIdParts[1]}}/commits
      items_expr: it
      get_id_expr: it.sha
      query_params:
        page: flags.page
        limit: flags.limit
      paging:
        paging_strategy: page_header
        countable: false
        page_index_param: page
        page_size_param: limit
        page_size_default: 30
        page_size_max: 100
        page_base: 1
      columns: [sha, title, author, authored]

  # ── commit_check ─────────────────────────────────────────────────────────────

  - command: list commit_check
    verb: list
    noun: commit_check
    short: "List status check results for a specific commit: harness list commit_check <repo_id>/<commit_sha>"
    handler_type: endpoint
    requires_parentid: true
    parentid_label: "<repo_id>/<commit_sha>"
    id_parts: 2
    completion_seq:
      - completion_noun: repository
      - completion_noun: commit
        keep_order: true
    flags:
      - name: search
        description: Filter by check identifier substring
    endpoint:
      path: /code/api/v1/repos/{{ctx.parentIdParts[0]}}/checks/commits/{{ctx.parentIdParts[1]}}
      items_expr: it
      get_id_expr: it.identifier
      query_params:
        query: flags.search
        page: flags.page
        limit: flags.limit
      paging:
        paging_strategy: page_header
        countable: false
        page_index_param: page
        page_size_param: limit
        page_size_default: 30
        page_size_max: 100
        page_base: 1
      columns: [identifier, status, summary, reported_by, duration]

  # ── pr_check ─────────────────────────────────────────────────────────────────

  - command: list pr_check
    verb: list
    noun: pr_check
    short: "List status checks for a pull request: harness list pr_check <repo_id>/<pr_number>"
    handler_type: endpoint
    requires_parentid: true
    parentid_label: "<repo_id>/<pr_number>"
    id_parts: 2
    completion_seq:
      - completion_noun: repository
      - completion_noun: pr
        keep_order: true
    endpoint:
      path: /code/api/v1/repos/{{ctx.parentIdParts[0]}}/pullreq/{{ctx.parentIdParts[1]}}/checks
      items_expr: it.checks
      get_id_expr: it.check.identifier
      paging:
        paging_strategy: flat_list
      columns: [identifier, status, required, summary, reported_by, duration]

  # ── pr_comment ───────────────────────────────────────────────────────────────

  - command: list pr_comment
    verb: list
    noun: pr_comment
    short: "List comments on a pull request: harness list pr_comment <repo_id>/<pr_number>"
    handler_type: endpoint
    requires_parentid: true
    parentid_label: "<repo_id>/<pr_number>"
    id_parts: 2
    completion_seq:
      - completion_noun: repository
      - completion_noun: pr
        keep_order: true
    endpoint:
      path: /code/api/v1/repos/{{ctx.parentIdParts[0]}}/pullreq/{{ctx.parentIdParts[1]}}/activities
      items_expr: it
      get_id_expr: string(it.id)
      query_params:
        kind: '"comment"'
        limit: flags.limit
      paging:
        paging_strategy: flat_list
      fields_extra:
        - id: short_text
          label: Short Text
          expr: truncate(it.text, 60)
          width_max: 63
      completion:
        id_expr: string(it.id)
        name_expr: 'formatOrder(it.order, it.sub_order) + " " + it.author.display_name + ": " + truncate(it.text, 40)'
        no_search_inject: true
      columns: [id, order, author, short_text, status, created]

  - command: create pr_comment
    verb: create
    noun: pr_comment
    short: "Post a comment on a pull request: harness create pr_comment <repo_id>/<pr_number> -f <file>"
    handler_type: endpoint
    requires_id: true
    id_parts: 2
    id_label: "<repo_id>/<pr_number>"
    completion_seq:
      - completion_noun: repository
      - completion_noun: pr
        keep_order: true
    flags:
      - name: file
        short: f
        description: "Comment text file, or - to read from stdin"
        required: true
      - name: reply-to
        description: Comment ID to reply to (creates a threaded reply)
    endpoint:
      method: POST
      path: /code/api/v1/repos/{{ctx.idParts[0]}}/pullreq/{{ctx.idParts[1]}}/comments
      body_fn: create_pr_comment_body
      no_fields: true
      text_header: "\nPosted comment #{{it.id}}\n"

  - command: update pr_comment
    verb: update
    noun: pr_comment
    short: "Edit a pull request comment: harness update pr_comment <repo_id>/<pr_number>/<comment_id> --set text=..."
    handler_type: endpoint
    id_parts: 3
    id_label: "<repo_id>/<pr_number>/<comment_id>"
    completion_seq:
      - completion_noun: repository
      - completion_noun: pr
        keep_order: true
      - completion_noun: pr_comment
        keep_order: true
    flags:
      - name: text
        description: New comment text
    endpoint:
      method: PATCH
      path: /code/api/v1/repos/{{ctx.idParts[0]}}/pullreq/{{ctx.idParts[1]}}/comments/{{ctx.idParts[2]}}
      body_params:
        text: flags.text
      no_fields: true
      text_header: "\nUpdated comment #{{ctx.idParts[2]}}\n"

  - command: delete pr_comment
    verb: delete
    noun: pr_comment
    confirm_mode: prompt
    short: "Delete a pull request comment: harness delete pr_comment <repo_id>/<pr_number>/<comment_id>"
    handler_type: endpoint
    id_parts: 3
    id_label: "<repo_id>/<pr_number>/<comment_id>"
    completion_seq:
      - completion_noun: repository
      - completion_noun: pr
        keep_order: true
      - completion_noun: pr_comment
        keep_order: true
    endpoint:
      method: DELETE
      path: /code/api/v1/repos/{{ctx.idParts[0]}}/pullreq/{{ctx.idParts[1]}}/comments/{{ctx.idParts[2]}}
      item_expr: it

