spec_version: 1
module_type: builtin
module_desc: Infrastructure as Code Management (workspaces, resources)
help_text: |
  ## Infrastructure as Code Management (iacm)

  Harness IACM manages Terraform and OpenTofu infrastructure lifecycles. It tracks
  workspace state, runs plans and applies, and provides drift detection and cost
  estimation across your infrastructure.

  ### Domain Model

  A workspace is the core unit — it maps to a Terraform workspace with a specific
  backend, variables, and state. Workspaces run operations (plan, apply, destroy)
  which produce execution logs and state snapshots.

  ### Nouns

  {{nouns}}

nouns:
  - noun: workspace
    short_desc: An IACM workspace that manages Terraform/OpenTofu infrastructure state.
    noun_aliases: [workspaces]
    url_path: /ng/account/{{auth.account}}/module/iacm/orgs/{{auth.org}}/projects/{{auth.project}}/workspaces/{{it.identifier}}
    fields:
      - id: identifier
        expr: it.identifier
      - id: name
        expr: it.name
      - id: status
        expr: it.status
      - id: description
        expr: it.description
      - id: repository_path
        expr: it.repository_path
      - id: updated
        expr: epochMs(it.updated)

  - noun: host
    short_desc: An IACM Ansible host tracked across inventories.
    noun_aliases: [hosts]
    fields:
      - id: id
        expr: it.id
      - id: host_address
        expr: it.host_address
      - id: status
        expr: 'it.last_activity != nil ? it.last_activity.status : nil'
      - id: inventories
        expr: it.inventories
      - id: created
        expr: epochMs(it.created)
      - id: updated
        expr: epochMs(it.updated)

  - noun: inventory
    short_desc: An IACM Ansible inventory of hosts and groups.
    noun_aliases: [inventories]
    fields:
      - id: identifier
        expr: it.identifier
      - id: name
        expr: it.name
      - id: type
        expr: it.type
      - id: description
        expr: it.description
      - id: account
        expr: it.account
      - id: org
        expr: it.org
      - id: project
        expr: it.project
      - id: tags
        expr: it.tags
      - id: created
        expr: epochMs(it.created)
      - id: updated
        expr: epochMs(it.updated)

  - noun: playbook
    short_desc: An IACM Ansible playbook definition.
    noun_aliases: [playbooks]
    fields:
      - id: identifier
        expr: it.identifier
      - id: name
        expr: it.name
      - id: description
        expr: it.description
      - id: repository
        expr: it.repository
      - id: repository_branch
        expr: it.repository_branch
      - id: repository_connector
        expr: it.repository_connector
      - id: repository_path
        expr: it.repository_path
      - id: tags
        expr: it.tags
      - id: created
        expr: epochMs(it.created)
      - id: updated
        expr: epochMs(it.updated)

  # `module` is already a CLI noun in core.spec.yaml (lists/installs loaded CLI
  # modules). An IaCM registry module is a distinct resource, not a variant of
  # that noun, so per the naming convention (`_` separates words in a distinct
  # base noun; `:` is reserved for noun-variants) it gets its own base noun
  # `registry_module` → `harness list registry_module` / `get registry_module <id>`.
  - noun: registry_module
    short_desc: An IACM Terraform/OpenTofu module from the module registry.
    noun_aliases: [registry_modules]
    fields:
      - id: id
        expr: it.id
      - id: name
        expr: it.name
      - id: system
        expr: it.system
      - id: namespace
        expr: it.namespace
      - id: description
        expr: it.description
      - id: org
        expr: it.org
      - id: project
        expr: it.project
      - id: repository
        expr: it.repository
      - id: repository_branch
        expr: it.repository_branch
      - id: repository_connector
        expr: it.repository_connector
      - id: versions
        expr: it.versions
      - id: created
        expr: epochMs(it.created)
      - id: updated
        expr: epochMs(it.updated)

  - noun: provider
    short_desc: An IACM Terraform provider from the provider registry.
    noun_aliases: [providers]
    fields:
      - id: id
        expr: it.id
      - id: type
        expr: it.type
      - id: namespace
        expr: it.namespace
      - id: description
        expr: it.description
      - id: domain_prefix
        expr: it.domain_prefix
      - id: account
        expr: it.account
      - id: versions
        expr: it.versions
      - id: created
        expr: epochMs(it.created)
      - id: updated
        expr: epochMs(it.updated)

commands:
  - command: list workspace
    verb: list
    noun: workspace
    short: List IACM workspaces in a project
    handler_type: endpoint
    flags:
      - name: search
        description: Filter workspaces by name
    endpoint:
      path: /gateway/iacm/api/orgs/{{auth.org}}/projects/{{auth.project}}/workspaces
      items_expr: it
      get_id_expr: it.identifier
      completion:
        id_expr: it.identifier
        name_expr: it.name
      query_params:
        searchTerm: flags.search
      paging:
        paging_strategy: page_header
        countable: true
        page_index_param: page
        page_size_param: limit
        page_size_default: 30
        page_size_max: 100
        page_base: 1
        total_header: "X-Total-Items"
      columns: [identifier, name, status, updated]

  - command: get workspace
    verb: get
    noun: workspace
    short: Get an IACM workspace by identifier
    completion_noun: workspace
    flags_builtin:
      ui: true
    handler_type: endpoint
    endpoint:
      path: /gateway/iacm/api/orgs/{{auth.org}}/projects/{{auth.project}}/workspaces/{{ctx.id}}
      item_expr: it

  - command: execute workspace
    verb: execute
    noun: workspace
    short: Execute a remote Terraform plan on a workspace
    long: |
      Execute a remote Terraform plan on an IaCM workspace.

      The workspace ID is optional. If omitted, the command reads it from
      .harness/workspace.yaml in the current directory:

        org_id:       <your-org>        # optional; overrides --org flag
        project_id:   <your-project>    # optional; overrides --project flag
        workspace_id: <your-workspace>  # required if no ID is passed as an argument

      Examples:
        harness execute workspace my-workspace              # explicit workspace ID
        harness execute workspace                           # reads .harness/workspace.yaml
        harness execute workspace --target aws_instance.web # limit plan to one resource
        harness execute workspace --force                   # skip confirmation prompt
    id_label: "<workspace-id>"
    id_optional: true
    completion_noun: workspace
    handler_type: workflow
    workflow_id: execute_workspace
    flags:
      - name: target
        description: "Resource target (can be specified multiple times)"
        is_multi: true
      - name: replace
        description: "Variable replacement in key=value format (can be specified multiple times)"
        is_multi: true
      - name: branch
        description: "Git branch to use for execution (overrides workspace default)"
      - name: force
        description: "Skip confirmation prompt"
        is_bool: true

  # ── host (Ansible) ────────────────────────────────────────────────────────────
  - command: list host
    verb: list
    noun: host
    short: List IACM Ansible hosts at the project level
    handler_type: endpoint
    flags:
      - name: search
        description: Filter hosts by partial host address match
      - name: inventory
        description: Filter hosts by inventory membership
      - name: status
        description: Filter hosts by last activity status
    endpoint:
      path: /gateway/iacm/api/orgs/{{auth.org}}/projects/{{auth.project}}/ansible/hosts
      request_headers:
        Harness-Account: auth.account
      items_expr: it
      get_id_expr: it.id
      completion:
        id_expr: it.id
        name_expr: it.host_address
      query_params:
        searchTerm: flags.search
        inventory: flags.inventory
        status: flags.status
      paging:
        paging_strategy: page_header
        countable: true
        page_index_param: page
        page_size_param: limit
        page_size_default: 30
        page_size_max: 100
        page_base: 1
        total_header: "X-Total-Items"
      columns: [id, host_address, status, updated]

  - command: get host
    verb: get
    noun: host
    short: Get an IACM Ansible host by identifier
    completion_noun: host
    handler_type: endpoint
    endpoint:
      path: /gateway/iacm/api/orgs/{{auth.org}}/projects/{{auth.project}}/ansible/hosts/{{ctx.id}}
      request_headers:
        Harness-Account: auth.account
      item_expr: it
      yaml_pick_expr: it

  # ── inventory (Ansible) ─────────────────────────────────────────────────────--
  - command: list inventory
    verb: list
    noun: inventory
    short: List IACM Ansible inventories at the project level
    handler_type: endpoint
    flags:
      - name: search
        description: Filter inventories by partial name match
    endpoint:
      path: /gateway/iacm/api/orgs/{{auth.org}}/projects/{{auth.project}}/ansible/inventory
      request_headers:
        Harness-Account: auth.account
      items_expr: it
      get_id_expr: it.identifier
      completion:
        id_expr: it.identifier
        name_expr: it.name
      query_params:
        searchTerm: flags.search
      paging:
        paging_strategy: page_header
        countable: true
        page_index_param: page
        page_size_param: limit
        page_size_default: 30
        page_size_max: 100
        page_base: 1
        total_header: "X-Total-Items"
      columns: [identifier, name, type, updated]

  - command: get inventory
    verb: get
    noun: inventory
    short: Get an IACM Ansible inventory by identifier
    completion_noun: inventory
    handler_type: endpoint
    endpoint:
      path: /gateway/iacm/api/orgs/{{auth.org}}/projects/{{auth.project}}/ansible/inventory/{{ctx.id}}
      request_headers:
        Harness-Account: auth.account
      item_expr: it
      yaml_pick_expr: it

  # ── playbook (Ansible) ──────────────────────────────────────────────────────--
  - command: list playbook
    verb: list
    noun: playbook
    short: List IACM Ansible playbooks at the project level
    handler_type: endpoint
    flags:
      - name: search
        description: Filter playbooks by partial name match
    endpoint:
      path: /gateway/iacm/api/orgs/{{auth.org}}/projects/{{auth.project}}/ansible/playbook
      request_headers:
        Harness-Account: auth.account
      items_expr: it
      get_id_expr: it.identifier
      completion:
        id_expr: it.identifier
        name_expr: it.name
      query_params:
        searchTerm: flags.search
      paging:
        paging_strategy: page_header
        countable: true
        page_index_param: page
        page_size_param: limit
        page_size_default: 30
        page_size_max: 100
        page_base: 1
        total_header: "X-Total-Items"
      columns: [identifier, name, repository, updated]

  - command: get playbook
    verb: get
    noun: playbook
    short: Get an IACM Ansible playbook by identifier
    completion_noun: playbook
    handler_type: endpoint
    endpoint:
      path: /gateway/iacm/api/orgs/{{auth.org}}/projects/{{auth.project}}/ansible/playbook/{{ctx.id}}
      request_headers:
        Harness-Account: auth.account
      item_expr: it
      yaml_pick_expr: it

  # ── registry_module (registry) ──────────────────────────────────────────────--
  - command: list registry_module
    verb: list
    noun: registry_module
    short: List IACM modules at the level queried
    handler_type: endpoint
    flags:
      - name: search
        description: Filter modules by partial name or provider match
    endpoint:
      path: /gateway/iacm/api/modules
      request_headers:
        Harness-Account: auth.account
      items_expr: it
      get_id_expr: it.id
      completion:
        id_expr: it.id
        name_expr: it.name
      query_params:
        searchTerm: flags.search
        scope_org: auth.org
        scope_project: auth.project
      paging:
        paging_strategy: page_header
        countable: true
        page_index_param: page
        page_size_param: limit
        page_size_default: 30
        page_size_max: 100
        page_base: 1
        total_header: "X-Total-Items"
      columns: [id, name, system, updated]

  - command: get registry_module
    verb: get
    noun: registry_module
    short: Get an IACM module by identifier
    completion_noun: registry_module
    handler_type: endpoint
    endpoint:
      path: /gateway/iacm/api/modules/{{ctx.id}}
      request_headers:
        Harness-Account: auth.account
      query_params:
        scope_org: auth.org
        scope_project: auth.project
      item_expr: it
      yaml_pick_expr: it

  # ── provider (registry) ─────────────────────────────────────────────────────--
  - command: list provider
    verb: list
    noun: provider
    short: List IACM providers at the level queried
    handler_type: endpoint
    flags:
      - name: search
        description: Filter providers by partial name match
    endpoint:
      path: /gateway/iacm/api/providers
      request_headers:
        Harness-Account: auth.account
      items_expr: it
      get_id_expr: it.id
      completion:
        id_expr: it.id
        name_expr: it.type
      query_params:
        searchTerm: flags.search
      paging:
        paging_strategy: page_header
        countable: true
        page_index_param: page
        page_size_param: limit
        page_size_default: 30
        page_size_max: 100
        page_base: 1
        total_header: "X-Total-Items"
      columns: [id, type, namespace, updated]

  - command: get provider
    verb: get
    noun: provider
    short: Get an IACM provider by identifier
    completion_noun: provider
    handler_type: endpoint
    endpoint:
      path: /gateway/iacm/api/providers/{{ctx.id}}
      request_headers:
        Harness-Account: auth.account
      item_expr: it
      yaml_pick_expr: it

  # ── state operations ──────────────────────────────────────────────────────────
  - command: state list
    verb: state
    noun: list
    short: List all resources in workspace terraform state
    long: |
      List all resources in the workspace's current terraform state file.
      
      Shows resource addresses including modules, count/for_each indexing,
      and data sources.
      
      Examples:
        harness state list my-workspace
        harness state list my-workspace --format=json
    completion_noun: workspace
    handler_type: endpoint
    flags:
      - name: format
        description: "Output format: table, json, or addresses"
        default: "table"
    endpoint:
      path: /gateway/iacm/api/orgs/{{auth.org}}/projects/{{auth.project}}/workspaces/{{ctx.id}}/state/resources
      items_expr: it.resources
      columns: [address, type, mode]

  - command: state show
    verb: state
    noun: show
    short: Show details of a specific resource in state
    long: |
      Show the full resource definition from the workspace's terraform state.
      
      Displays attributes, dependencies, and provider information.
      
      Examples:
        harness state show my-workspace aws_instance.web
        harness state show my-workspace 'module.vpc.aws_subnet.public[0]'
    completion_noun: workspace
    handler_type: endpoint
    flags:
      - name: address
        description: "Resource address (e.g., aws_instance.web)"
        required: true
    endpoint:
      path: /gateway/iacm/api/orgs/{{auth.org}}/projects/{{auth.project}}/workspaces/{{ctx.id}}/state/resources/{{flags.address}}
      item_expr: it

  - command: state mv
    verb: state
    noun: mv
    short: Move or rename a resource in state
    long: |
      Rename a resource address in the workspace's terraform state.
      
      Creates a new state version. Workspace must not be locked.
      
      Examples:
        harness state mv my-workspace aws_instance.old aws_instance.new
        harness state mv my-workspace 'aws_instance.web' 'module.app.aws_instance.web'
    completion_noun: workspace
    handler_type: endpoint
    flags:
      - name: source
        description: "Source resource address"
        required: true
      - name: destination
        description: "Destination resource address"
        required: true
      - name: reason
        description: "Reason for the move (for audit log)"
    endpoint:
      method: POST
      path: /gateway/iacm/api/orgs/{{auth.org}}/projects/{{auth.project}}/workspaces/{{ctx.id}}/state/resources/move
      body:
        source: flags.source
        destination: flags.destination
        reason: flags.reason

  - command: state rm
    verb: state
    noun: rm
    short: Remove a resource from state (orphan it)
    long: |
      Remove a resource from the workspace's terraform state tracking.
      
      The infrastructure resource remains unchanged - only the state entry is removed.
      Creates a new state version. Workspace must not be locked.
      
      Examples:
        harness state rm my-workspace aws_instance.old
        harness state rm my-workspace 'aws_instance.servers[0]'
    completion_noun: workspace
    handler_type: endpoint
    flags:
      - name: address
        description: "Resource address to remove"
        required: true
      - name: reason
        description: "Reason for removal (for audit log)"
      - name: force
        description: "Skip confirmation prompt"
        is_bool: true
    endpoint:
      method: DELETE
      path: /gateway/iacm/api/orgs/{{auth.org}}/projects/{{auth.project}}/workspaces/{{ctx.id}}/state/resources/{{flags.address}}
      body:
        reason: flags.reason

  - command: state replace-provider
    verb: state
    noun: replace-provider
    short: Replace provider namespace in state
    long: |
      Update all resources in state from old provider to new provider.
      
      Used for provider migrations (e.g., legacy to registry format).
      Creates a new state version. Workspace must not be locked.
      
      Examples:
        harness state replace-provider my-workspace \\
          'registry.terraform.io/-/aws' \\
          'registry.terraform.io/hashicorp/aws'
    completion_noun: workspace
    handler_type: endpoint
    flags:
      - name: from
        description: "Old provider address"
        required: true
      - name: to
        description: "New provider address"
        required: true
      - name: reason
        description: "Reason for replacement (for audit log)"
    endpoint:
      method: POST
      path: /gateway/iacm/api/orgs/{{auth.org}}/projects/{{auth.project}}/workspaces/{{ctx.id}}/state/providers/replace
      body:
        from: flags.from
        to: flags.to
        reason: flags.reason
