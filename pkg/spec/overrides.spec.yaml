spec_version: 1
module_type: builtin
module_desc: Harness Service Overrides V2 — override variables, manifests, and config files at environment, infrastructure, or cluster scope

nouns:
  - noun: service_override
    short_desc: An override for service configuration within an environment, infrastructure, or cluster.
    noun_aliases: [service_overrides, override, overrides]
    url_path: /ng/account/{{auth.account}}/all/cd/orgs/{{auth.org}}/projects/{{auth.project}}/serviceOverrides
    fields:
      - id: identifier
        expr: it.identifier
      - id: type
        expr: it.type
      - id: environment
        expr: it.environmentRef
      - id: service
        expr: it.serviceRef
      - id: infra
        expr: it.infraIdentifier
      - id: updated
        expr: epochMs(it.lastModifiedAt)
      - id: created
        expr: epochMs(it.createdAt)

commands:
  - command: list service_override
    verb: list
    noun: service_override
    short: "List service overrides for an environment: harness list service_override --env <environment_id>"
    handler_type: endpoint
    flags:
      - name: env
        description: Environment identifier (required)
        required: true
      - name: service
        description: Filter by service identifier
    endpoint:
      path: /ng/api/environmentsV2/serviceOverrides
      query_params:
        environmentIdentifier: flags.env
        serviceIdentifier: flags.service
        page: flags.page
        size: flags.limit
      items_expr: it.data.content
      item_item_expr: it
      get_id_expr: it.identifier
      paging:
        paging_strategy: page_index
        countable: true
        page_index_param: page
        page_size_param: size
        page_size_default: 20
        page_size_max: 100
        total_expr: it.data.totalItems
      columns: [identifier, type, environment, service, infra, updated]

  - command: get service_override
    verb: get
    noun: service_override
    short: Get service override details
    handler_type: endpoint
    endpoint:
      path: /ng/api/serviceOverrides/{{ctx.id}}
      item_expr: it.data

  - command: create service_override
    verb: create
    noun: service_override
    short: "Create a service override: harness create service_override <id> --set environmentRef=<env> type=ENV_GLOBAL_OVERRIDE"
    handler_type: endpoint
    flags_builtin:
      set: true
    endpoint:
      method: POST
      path: /ng/api/serviceOverrides
      create_strategy: set-fields
      create_body_init:
        identifier: ctx.id
        environmentRef: coalesce(ctx.setArgs.environmentRef, ctx.setArgs.env, "")
        type: coalesce(ctx.setArgs.type, '"ENV_GLOBAL_OVERRIDE"')
      create_body_wrap: ""
      item_expr: it.data
      text_header: "\nCreated service override {{it.identifier}}\n"

  - command: update service_override
    verb: update
    noun: service_override
    short: Update a service override
    handler_type: endpoint
    flags_builtin:
      set: true
      del: true
    endpoint:
      method: PUT
      path: /ng/api/serviceOverrides
      update_strategy: get-then-put
      update_body_pick: it.data
      update_body_wrap: ""
      item_expr: it.data
      text_header: "\nUpdated service override {{ctx.id}}\n"

  - command: delete service_override
    verb: delete
    noun: service_override
    confirm_mode: prompt
    short: Delete a service override
    handler_type: endpoint
    endpoint:
      method: DELETE
      path: /ng/api/serviceOverrides/{{ctx.id}}
