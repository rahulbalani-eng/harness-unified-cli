spec_version: 1
module_type: builtin
module_desc: Pipeline execution, logs, and step management
help_text: |
  ## Pipelines (pipeline)

  Harness Pipelines are the core execution primitive for CI/CD workflows. A pipeline
  defines stages and steps that run in sequence or in parallel, and can be triggered
  manually, on a schedule, or via webhook events.

  ### Domain Model

  A pipeline is a definition. When you run it, you get an execution (a run instance).
  Executions contain stages, and stages contain steps — use execution_step to inspect
  per-step status when diagnosing failures.

  Pipelines can require runtime inputs at execution time. Check runtime_input_template
  before executing to know what inputs are needed. Saved input_sets let you reuse a
  fixed set of runtime values across runs.

  Templates are reusable building blocks — a template can represent a full pipeline,
  a stage, or a step, and is referenced by other pipelines rather than copy-pasted.

  ### Nouns

  {{nouns}}

nouns:
  - noun: pipeline
    short_desc: A CI/CD pipeline definition with stages, steps, and trigger configuration.
    noun_aliases: [pipelines]
    url_path: /ng/account/{{auth.account}}/all/orgs/{{auth.org}}/projects/{{auth.project}}/pipelines/{{it.identifier}}
    fields:
      - id: identifier
        expr: it.identifier
      - id: name
        expr: it.name
      - id: description
        expr: it.description
      - id: modules
        expr: jsonArray(it.modules)
      - id: store_type
        expr: it.store_type
      - id: connector_ref
        expr: it.connector_ref
      - id: valid
        expr: it.valid
      - id: yaml_version
        expr: it.yaml_version
      - id: created
        expr: epochMs(it.created)
      - id: updated
        expr: epochMs(it.updated)
      - id: git_branch
        expr: it.git_details.branch_name
      - id: git_repo
        expr: it.git_details.repo_name
      - id: recent
        expr: pipelineSparkline(it.recent_execution_info)
      - id: last_run_by
        expr: it.recent_execution_info[0].executor_info.email
      - id: last_run
        expr: epochMs(it.recent_execution_info[0].ended)
      - id: last_status
        expr: it.recent_execution_info[0].execution_status

  - noun: execution
    short_desc: A single pipeline run instance with status, timing, and trigger info.
    noun_aliases: [executions]
    url_path: "/ng/account/{{auth.account}}/all/orgs/{{auth.org}}/projects/{{auth.project}}/pipelines/{{'pipelineExecutionSummary' in it ? it.pipelineExecutionSummary.pipelineIdentifier : it.pipelineIdentifier}}/deployments/{{'pipelineExecutionSummary' in it ? it.pipelineExecutionSummary.planExecutionId : it.planExecutionId}}/pipeline"
    fields:
      - id: id
        label: ID
        expr: it.planExecutionId
      - id: pipeline
        expr: it.pipelineIdentifier
      - id: status
        expr: spaceAfter(statusIcon(it.status)) + it.status
      - id: run_seq
        label: "Run #"
        expr: it.runSequence
        align: right
      - id: started
        expr: epochMs(it.startTs)
      - id: ended
        expr: epochMs(it.endTs)
      - id: duration
        expr: duration(it.startTs, it.endTs)
        align: right
      - id: trigger
        expr: it.executionTriggerInfo.triggerType
      - id: triggered_by
        expr: it.executionTriggerInfo.triggeredBy.extraInfo.email
      - id: error
        expr: it.failureInfo.message
      - id: url
        expr: url(it)

  - noun: trigger
    short_desc: An event-based trigger that automatically starts a pipeline.
    noun_aliases: [triggers]
    fields:
      - id: identifier
        expr: it.identifier
      - id: name
        expr: it.name
      - id: type
        expr: it.type
      - id: enabled
        expr: it.enabled

  - noun: input_set
    short_desc: A reusable set of runtime inputs that can be applied when running a pipeline.
    noun_aliases: [input_sets]
    fields:
      - id: identifier
        expr: it.identifier
      - id: name
        expr: it.name
      - id: pipeline
        expr: it.pipelineIdentifier
      - id: store_type
        expr: it.storeType
      - id: outdated
        expr: it.outdated
      - id: valid
        expr: it.entityValidityDetails.valid
      - id: yaml
        expr: it.inputSetYaml
        field_type: yaml

  - noun: template
    short_desc: A reusable pipeline template for stages, steps, or full pipelines.
    noun_aliases: [templates]
    fields:
      - id: identifier
        expr: it.identifier
      - id: name
        expr: it.name
      - id: type
        expr: it.templateEntityType
      - id: version
        expr: it.versionLabel
      - id: stable
        expr: it.stableTemplate

  - noun: pipeline_v1
    short_desc: A v1-schema pipeline (simplified list fields for legacy API compatibility).
    fields:
      - id: identifier
        expr: it.identifier
      - id: name
        expr: it.name

  - noun: pipeline_summary
    short_desc: Lightweight pipeline overview with execution history, as returned by the list endpoint.
    url_path: /ng/account/{{auth.account}}/all/orgs/{{auth.org}}/projects/{{auth.project}}/pipelines/{{it.identifier}}
    fields:
      - id: identifier
        expr: it.identifier
      - id: name
        expr: it.name
      - id: store
        expr: it.storeType
      - id: version
        expr: it.yamlVersion
      - id: stages
        expr: it.numOfStages
      - id: modules
        expr: jsonArray(it.modules)
      - id: last_run
        expr: epochMs(it.executionSummaryInfo.lastExecutionTs)
      - id: last_status
        expr: it.executionSummaryInfo.lastExecutionStatus
      - id: last_run_id
        label: Last Run ID
        expr: it.executionSummaryInfo.lastExecutionId
      - id: updated
        expr: epochMs(it.lastUpdatedAt)
      - id: created
        expr: epochMs(it.createdAt)
      - id: url
        expr: url(it)

  - noun: approval_instance
    short_desc: A pending or resolved manual approval step within a pipeline execution.
    noun_aliases: [approval_instances]
    fields:
      - id: id
        label: ID
        expr: it.id
      - id: type
        expr: it.type
      - id: status
        expr: it.status
      - id: pipeline
        expr: it.pipelineIdentifier

  - noun: freeze_window
    short_desc: A scheduled deployment freeze window that blocks pipeline executions.
    noun_aliases: [freeze_windows]
    multi_level: true
    fields:
      - id: identifier
        expr: it.identifier
      - id: name
        expr: it.name
      - id: status
        expr: it.status
      - id: scope
        expr: it.freezeScope
      - id: type
        expr: it.type
      - id: updated
        expr: epochMs(it.lastUpdatedAt)

  - noun: global_freeze
    short_desc: An account-wide or org-wide deployment freeze that halts all deployments.
    fields:
      - id: identifier
        expr: it.identifier
      - id: status
        expr: it.status
      - id: scope
        expr: it.freezeScope
      - id: updated
        expr: epochMs(it.lastUpdatedAt)

  - noun: execution_log
    short_desc: Streamed or fetched log output from a pipeline execution step.
    fields:
      - id: log_key
        expr: it["log_key"]
      - id: name
        expr: it["name"]
      - id: fqn
        label: FQN
        expr: it["fqn"]
      - id: status
        expr: it["status"]

  - noun: execution_step
    short_desc: An individual step within a pipeline execution, including loop and matrix iterations.
    fields:
      - id: name
        expr: spaceAfter(statusIcon(it["status"])) + it["name"]
      - id: type
        expr: it["type"]
      - id: status
        expr: spaceAfter(statusIcon(it["status"])) + it["status"]
      - id: duration
        expr: it["duration"]
        align: right
      - id: delegate
        expr: it["delegate"]
      - id: error
        expr: it["error"]
      - id: identifier
        expr: it["identifier"]
      - id: fqn
        label: FQN
        expr: it["fqn"]
      - id: log_key
        label: LogKey
        expr: it["log_key"]
      - id: uuid
        label: UUID
        expr: it["uuid"]
      - id: started
        label: Started
        expr: epochMs(it["started"])
      - id: child_execution_id
        label: Child ExecId
        expr: it["child_execution_id"]

  - noun: runtime_input_template
    short_desc: The set of runtime input placeholders (<+input>) that a pipeline requires at execution time.

  - noun: execution_result
    short_desc: Detailed execution outcome with stage and step results from a pipeline run.
    url_path: /ng/account/{{auth.account}}/all/orgs/{{auth.org}}/projects/{{auth.project}}/pipelines/{{it.metadata.pipelineIdentifier}}/deployments/{{it.uuid}}/pipeline
    fields:
      - id: execution_id
        label: ExecutionId
        expr: it.uuid
      - id: run_seq
        label: RunSeq
        expr: it.metadata.runSequence
      - id: pipeline
        label: Pipeline
        expr: it.metadata.pipelineIdentifier
      - id: status
        expr: it.status
      - id: started
        expr: epochMs(it.startTs)

  - noun: execution_result_dynamic
    short_desc: Execution result from a dynamic pipeline run.
    fields:
      - id: execution_id
        label: ExecutionId
        expr: it.execution_id
      - id: status
        expr: it.status

commands:
  - command: get pipeline
    verb: get
    noun: pipeline
    short: Get a pipeline's YAML definition (--format json to convert, --raw for full envelope)
    handler_type: endpoint
    flags:
      - name: branch
        description: Branch name (for remote pipelines)
    endpoint:
      path: /v1/orgs/{{auth.org}}/projects/{{auth.project}}/pipelines/{{ctx.id}}
      item_expr: it
      field_extract: pipeline_yaml
      query_params:
        branch_name: flags.branch

  - command: list pipeline
    verb: list
    noun: pipeline
    short: List pipelines in a project
    handler_type: endpoint
    flags:
      - name: search
        description: Filter pipelines by name
    endpoint:
      path: /v1/orgs/{{auth.org}}/projects/{{auth.project}}/pipelines
      items_expr: it
      get_id_expr: it.identifier
      query_params:
        search_term: flags.search
      paging:
        paging_strategy: page_header
        countable: true
        page_index_param: page
        page_size_param: limit
        page_size_default: 30
        page_size_max: 100
      completion:
        id_expr: it.identifier
        name_expr: it.name
      columns: [identifier, recent, last_run_by, last_run, last_status]

  - command: create pipeline
    verb: create
    noun: pipeline
    short: "Create a pipeline: inline from YAML (-f file.yaml) or Git-backed (--connector, --repo, --file-path)"
    handler_type: endpoint
    flags:
      - name: connector
        description: Git connector reference ID (remote only)
      - name: repo
        description: Git repository name (remote only)
      - name: branch
        default: main
        description: Branch (remote only)
      - name: file-path
        description: Path to the pipeline YAML in the repo, e.g. .harness/my_pipeline.yaml (remote only)
    endpoint:
      method: POST
      path: /pipeline/api/pipelines/v2
      file_body: required
      content_type: application/yaml
      item_expr: it.data
      text_header: "\nCreated pipeline {{it.identifier}} in org [{{auth.org}}] project [{{auth.project}}]\n"
      text_footer: "{{url(it)}}\n"
      validators_endpoint: [validate_pipeline_create]
      query_params:
        storeType: 'flags.connector != "" ? "REMOTE" : ""'
        connectorRef: flags.connector
        repoName: flags.repo
        branch: flags.branch
        filePath: flags["file-path"]

  - command: update pipeline
    verb: update
    noun: pipeline
    short: Update a pipeline's YAML definition (-f file.yaml or -f - for stdin)
    handler_type: endpoint
    endpoint:
      method: PUT
      path: /pipeline/api/pipelines/v2/{{ctx.id}}
      file_body: required
      no_fields: true
      text_header: "\nUpdated pipeline {{ctx.id}}\n"

  - command: delete pipeline
    verb: delete
    noun: pipeline
    confirm_mode: prompt
    short: Delete a pipeline by identifier
    handler_type: endpoint
    endpoint:
      method: DELETE
      path: /v1/orgs/{{auth.org}}/projects/{{auth.project}}/pipelines/{{ctx.id}}
      item_expr: it
      text_header: "\nDeleted pipeline {{ctx.id}}\n"

  - command: execute pipeline
    verb: execute
    noun: pipeline
    fields_noun: execution_result
    short: Trigger a pipeline execution
    handler_type: endpoint
    follow_fn: execute_follow
    flags:
      - name: branch
        description: Branch to execute (for remote pipelines)
      - name: input-set
        description: Input set identifier to apply when executing
      - name: input
        description: "Runtime input as key=value (repeatable); e.g. --input loop_count=5"
        is_multi: true
      - name: input-file
        description: "Path to a runtimeInputYaml file (use - for stdin)"
      - name: follow
        is_bool: true
        description: Stream logs live after execution starts; exits when the execution reaches a terminal state
    endpoint:
      method: POST
      path: /pipeline/api/pipeline/execute/{{ctx.id}}
      item_expr: it.data.planExecution
      text_header: "\nExecution started successfully.\n"
      text_footer: |

        To follow:
        harness get execution {{it.metadata.pipelineIdentifier}}/{{it.uuid}}
        harness get execution_log {{it.metadata.pipelineIdentifier}}/{{it.uuid}} --follow
        harness get execution_log {{it.metadata.pipelineIdentifier}}/{{it.uuid}} --ui

        {{url(it)}}
      body_fn: execute_body
      query_params:
        branch: flags.branch
        inputSetIdentifiers: flags["input-set"]

  - command: execute pipeline:dynamic
    verb: execute
    noun: pipeline
    noun_variant: dynamic
    fields_noun: execution_result_dynamic
    short: Execute a pipeline with a fully dynamic inline YAML definition
    hidden: true
    handler_type: endpoint
    follow_fn: execute_follow
    flags:
      - name: file
        short: f
        description: "Path to the pipeline YAML to execute (use - for stdin)"
        required: true
      - name: notes
        description: Notes for this execution
      - name: module-type
        description: Module type that triggered the execution (e.g. cd, ci)
      - name: follow
        is_bool: true
        description: Stream logs live after execution starts; exits when the execution reaches a terminal state
    endpoint:
      method: POST
      path: /pipeline/api/v1/orgs/{{auth.org}}/projects/{{auth.project}}/pipelines/{{ctx.id}}/execute/dynamic
      item_expr: it.execution_details
      text_header: "\nExecution started successfully.\n"
      text_footer: |

        To follow:
        harness get execution {{ctx.id}}/{{it.execution_id}}
        harness get execution_log {{ctx.id}}/{{it.execution_id}} --follow
        harness get execution_log {{ctx.id}}/{{it.execution_id}} --ui

      body_fn: execute_dynamic_body
      query_params:
        notes: flags.notes
        moduleType: flags["module-type"]

  - command: execute pipeline:input_set
    verb: execute
    noun: pipeline
    noun_variant: input_set
    fields_noun: execution_result
    short: Execute a pipeline using the inputSetList endpoint (merges input sets server-side)
    handler_type: endpoint
    follow_fn: execute_follow
    flags:
      - name: branch
        description: Branch to execute (for remote pipelines)
      - name: input-set
        description: Input set identifier(s) to merge (repeatable)
        is_multi: true
      - name: input
        description: "Runtime input as key=value (repeatable); e.g. --input loop_count=5"
        is_multi: true
      - name: input-file
        description: "Path to a runtimeInputYaml file (use - for stdin)"
      - name: follow
        is_bool: true
        description: Stream logs live after execution starts; exits when the execution reaches a terminal state
    endpoint:
      method: POST
      path: /pipeline/api/pipeline/execute/{{ctx.id}}/inputSetList
      item_expr: it.data.planExecution
      text_header: "\nExecution started successfully.\n"
      text_footer: |

        To follow:
        harness get execution {{it.metadata.pipelineIdentifier}}/{{it.uuid}}
        harness get execution_log {{it.metadata.pipelineIdentifier}}/{{it.uuid}} --follow
        harness get execution_log {{it.metadata.pipelineIdentifier}}/{{it.uuid}} --ui

        {{url(it)}}
      body_fn: execute_inputset_body
      query_params:
        branch: flags.branch

  - command: get execution
    verb: get
    noun: execution
    short: Get a pipeline execution by ID
    id_allow_slash: true
    id_label: "<[pipeline/]id>"
    completion_seq:
      - completion_noun: pipeline
      - completion_noun: execution
        keep_order: true
    handler_type: endpoint
    flags:
      - name: no-graph
        description: Omit the stage/step execution graph from the response
        is_bool: true
    endpoint:
      path: /pipeline/api/pipelines/execution/v2/{{lastPart(ctx.id)}}
      item_expr: it.data
      text_formatter: execution_detail
      query_params:
        renderFullBottomGraph: 'flags["no-graph"] ? "" : "true"'

  - command: list execution
    verb: list
    noun: execution
    short: "List pipeline executions in a project (optional: scope to a pipeline ID)"
    completion_noun: pipeline
    handler_type: endpoint
    flags:
      - name: status
        description: Filter by status (Success, Failed, Running, Aborted, Paused, Queued, Waiting, Expired)
      - name: branch
        description: Filter by branch
      - name: module
        description: Filter by module (CI, CD, CV, CF, CE, STO)
    endpoint:
      method: POST
      path: /pipeline/api/pipelines/execution/summary
      body_params:
        filterType: '"PipelineExecution"'
      items_expr: it.data.content
      get_id_expr: it.pipelineIdentifier + "/" + it.planExecutionId
      paging:
        paging_strategy: page_index
        countable: true
        page_index_param: page
        page_size_param: size
        page_size_default: 10
        page_size_max: 100
        total_expr: it.data.totalElements
      completion:
        id_expr: it.planExecutionId
        name_expr: '"Run #" + string(it.runSequence) + " " + it.status + " " + epochMs(it.startTs)'
      query_params:
        pipelineIdentifier: ctx.parentId
        status: flags.status
        branch: flags.branch
        module: flags.module
      columns:
        [
          id,
          pipeline,
          status,
          run_seq,
          started,
          duration,
          trigger,
          triggered_by,
        ]

  - command: list execution_step
    verb: list
    noun: execution_step
    short: List expanded execution steps (including loop/matrix iterations) for a pipeline execution
    id_allow_slash: true
    requires_parentid: true
    parentid_label: "<[pipeline/]id>"
    completion_seq:
      - completion_noun: pipeline
      - completion_noun: execution
        keep_order: true
    handler_type: endpoint
    endpoint:
      fetch_fn: list_execution_steps_fetch
      items_expr: it
      get_id_expr: "-"
      paging:
        paging_strategy: flat_list
      columns: [name, type, child_execution_id, status, duration, delegate, error]

  - command: list execution_log
    verb: list
    noun: execution_log
    short: List all log keys for a pipeline execution
    id_allow_slash: true
    requires_parentid: true
    parentid_label: "<[pipeline/]id>"
    completion_seq:
      - completion_noun: pipeline
      - completion_noun: execution
        keep_order: true
    handler_type: endpoint
    endpoint:
      fetch_fn: list_execution_logs_fetch
      items_expr: it
      get_id_expr: it["log_key"]
      paging:
        paging_strategy: flat_list
      columns: [log_key, name, status]

  - command: get execution_log
    verb: get
    noun: execution_log
    short: Fetch logs for a pipeline execution
    requires_id: true
    id_allow_slash: true
    id_label: "<[pipeline/]execId>"
    completion_seq:
      - completion_noun: pipeline
      - completion_noun: execution
        keep_order: true
    handler_type: workflow
    workflow_id: get_pipeline_log
    flags_builtin:
      ui: true
    flags:
      - name: stage
        description: Filter to a specific stage
        completion_fn: pipeline_log_stage_completion
      - name: step
        description: Filter to a specific step within --stage (requires --stage)
        completion_fn: pipeline_log_step_completion
      - name: logkey-prefix
        description: Only show logs whose key starts with this string (use 'list execution_log' to find keys)
      - name: logkey
        description: Show logs for exactly this log key (use 'list execution_log' to find keys)
      - name: follow
        is_bool: true
        description: Stream logs live; exits when the execution reaches a terminal state
      - name: format-multi
        default: markers
        description: "How sources are shown when multiple logs are displayed: markers (==> source + events) or inline ([source] per line)"

  - command: list trigger
    verb: list
    noun: trigger
    short: List triggers for a pipeline
    completion_noun: pipeline
    requires_parentid: true
    parentid_label: pipeline
    handler_type: endpoint
    flags:
      - name: search
        description: Filter triggers by name or keyword
    endpoint:
      path: /pipeline/api/triggers
      items_expr: it.data.content
      get_id_expr: it.identifier
      completion:
        id_expr: it.identifier
        name_expr: it.name
      query_params:
        targetIdentifier: ctx.parentId
        searchTerm: flags.search
      paging:
        paging_strategy: page_index
        countable: true
        page_index_param: page
        page_size_param: size
        page_size_default: 25
        page_size_max: 100
        total_expr: it.data.totalItems
      columns: [identifier, name, type, enabled]

  - command: get trigger
    verb: get
    noun: trigger
    short: Get a trigger by identifier
    completion_noun: trigger
    handler_type: endpoint
    flags:
      - name: pipeline
        required: true
        description: Pipeline identifier the trigger belongs to
    endpoint:
      path: /pipeline/api/triggers/{{ctx.id}}
      item_expr: it.data
      query_params:
        targetIdentifier: flags.pipeline

  - command: list input_set
    verb: list
    noun: input_set
    short: List input sets for a pipeline
    completion_noun: pipeline
    requires_parentid: true
    parentid_label: pipeline
    handler_type: endpoint
    endpoint:
      path: /pipeline/api/inputSets
      items_expr: it.data.content
      get_id_expr: parentId + "/" + it.identifier
      completion:
        id_expr: it.identifier
        name_expr: it.name
      query_params:
        pipelineIdentifier: ctx.parentId
      paging:
        paging_strategy: page_index
        countable: true
        page_index_param: pageIndex
        page_size_param: pageSize
        page_size_default: 100
        page_size_max: 100
        total_expr: it.data.totalItems
      fields_subset: [identifier, name, pipeline, store_type, outdated]
      columns: [identifier, name, pipeline, store_type, outdated]

  - command: get input_set
    verb: get
    noun: input_set
    short: Get an input set by identifier
    id_parts: 2
    id_label: "<pipeline/id>"
    completion_seq:
      - completion_noun: pipeline
      - completion_noun: input_set
        keep_order: true
    handler_type: endpoint
    endpoint:
      path: /pipeline/api/inputSets/{{lastPart(ctx.id)}}
      item_expr: it.data
      query_params:
        pipelineIdentifier: ctx.idParts[0]

  - command: get runtime_input_template
    verb: get
    noun: runtime_input_template
    short: Get the runtime input template for a pipeline (shows all <+input> placeholders)
    completion_noun: pipeline
    handler_type: endpoint
    endpoint:
      method: POST
      path: /pipeline/api/inputSets/template
      item_expr: it.data.inputSetTemplateYaml
      query_params:
        pipelineIdentifier: ctx.id

  - command: list template
    verb: list
    noun: template
    short: List templates in a project
    handler_type: endpoint
    flags:
      - name: search
        description: Filter templates by name or keyword
      - name: list-type
        default: LastUpdated
        description: "Template list type: Stable, LastUpdated, All"
    endpoint:
      method: POST
      path: /template/api/templates/list
      items_expr: it.data.content
      get_id_expr: it.identifier
      completion:
        id_expr: it.identifier
        name_expr: it.name
      query_params:
        searchTerm: flags.search
        templateListType: flags.list-type
      body_params:
        filterType: '"Template"'
      paging:
        paging_strategy: page_index
        countable: true
        page_index_param: page
        page_size_param: size
        page_size_default: 25
        page_size_max: 100
        total_expr: it.data.totalElements
      columns: [identifier, name, type, version, stable]

  - command: get template
    verb: get
    noun: template
    short: Get a template by identifier
    completion_noun: template
    handler_type: endpoint
    flags:
      - name: version
        description: Template version label (defaults to stable)
    endpoint:
      path: /template/api/templates/{{ctx.id}}
      item_expr: it.data
      query_params:
        versionLabel: flags.version

  - command: list pipeline_v1
    verb: list
    noun: pipeline_v1
    short: List v1 pipelines in a project
    handler_type: endpoint
    flags:
      - name: search
        description: Filter pipelines by name
    endpoint:
      path: /v1/orgs/{{auth.org}}/projects/{{auth.project}}/pipelines
      items_expr: it
